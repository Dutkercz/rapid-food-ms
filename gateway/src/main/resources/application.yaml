spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: orders
              uri: http://localhost:8081
              predicates:
                - Path=/orders/**
              filters:
                - PrefixPath=/api

            - id: payments
              uri:
                http://localhost:8082
              predicates:
                - Path=/payments/**
              filters:
                - PrefixPath=/api

            - id: products
              uri:
                http://localhost:8083
              predicates:
                - Path=/products/**
              filters:
                - PrefixPath=/api

            - id: users
              uri:
                http://localhost:8084
              predicates:
                - Path=/users/**
              filters:
                - PrefixPath=/api

            - id: vendors
              uri: http://localhost:8085
              predicates:
                - Path=/vendors/**
              filters:
                - PrefixPath=/api